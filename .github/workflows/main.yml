name: main

# Define permissions for current workflow
permissions:
  contents: read
  checks: write

# Code runs only on pull request to main
on:
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest  # Standard runner, no custom container needed
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GHDL (Nightly)
        uses: ghdl/setup-ghdl@v1
        with:
          version: nightly
          backend: mcode  # mcode is fastest for CI; use 'llvm' if you need advanced features

      - name: Install Python dependencies
        run: |
          pip3 install cocotb
          pip3 install numpy
          pip3 install scipy
          pip3 install matplotlib

      - name: Run Simulation
        run: |
          mkdir -p xml-reports
          mkdir -p png-results

          cd tests/pff_tests
          python3 test_all.py
          cd
        
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always() # Run this even if the tests fail!
        with:
          report_paths: 'xml-reports/*.xml'

      - name: Upload Results as Artifact
        uses: actions/upload-artifact@v4
        if: always() # Upload even if tests fail, to capture results
        with:
          name: 'verification-results'
          path: |
            png-results/*.png
            xml-reports/*.xml
          overwrite: true